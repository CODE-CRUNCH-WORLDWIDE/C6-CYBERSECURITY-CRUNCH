<!doctype html>
<html lang="en">
<head>

<title>{% block title %}vuln_lab{% endblock %}</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 2em auto; line-height: 1.5; }
  nav a { margin-right: 1em; }
  pre { background: #f4f4f4; padding: 0.5em; border-left: 3px solid #888; }
  .banner { background: #ffe7c2; border: 1px solid #b87; padding: 0.7em; margin-bottom: 1em; }

</div>
<nav>
  <a href="{{ url_for('index') }}">Home</a>
  <a href="{{ url_for('login') }}">Login</a>
  <a href="{{ url_for('search') }}">Search</a>
  <a href="{{ url_for('comments') }}">Comments</a>

{% block body %}{% endblock %}
