{% extends "base.html" %}
{% block title %}vuln_lab - lookup{% endblock %}
{% block body %}
<h1>User lookup</h1>
<form method="get">
  <p><label>Username <input name="name" type="text" value="{{ name }}"></label>
     <button type="submit">Look up</button></p>
</form>
{% if rows %}
  <table border="1" cellpadding="4">
    <tr><th>id</th><th>username</th><th>email</th></tr>
    {% for row in rows %}
      <tr><td>{{ row.id }}</td><td>{{ row.username }}</td><td>{{ row.email }}</td></tr>
    {% endfor %}
  </table>
{% else %}
  <p>No rows.</p>
{% endif %}
{% endblock %}
